<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MathQuest — Desafío</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" href="/dashboard.html">
    <div class="logo-icon">∑</div>
    MathQuest
  </a>
  <div class="navbar-user">
    <span class="navbar-username" id="nav-username"></span>
    <button class="btn btn-ghost btn-sm" id="logout-btn">Salir</button>
  </div>
</nav>

<div class="challenge-wrapper">
  <div class="challenge-topbar">
    <a href="/dashboard.html" class="btn btn-ghost btn-sm">← Volver</a>
    <div class="timer-display" id="timer">00:00</div>
  </div>

  <div id="challenge-header" class="challenge-header">
    <div class="challenge-type-badge" id="type-badge">Cargando...</div>
    <h2 id="challenge-title">Cargando desafío...</h2>
    <p id="challenge-desc"></p>
  </div>

  <div id="challenge-body"></div>
</div>

<!-- Result Modal -->
<div id="result-modal" class="modal-overlay hidden">
  <div class="modal-card">
    <div id="score-circle" class="score-circle">
      <span class="score-num" id="score-num">0</span>
      <span class="score-pct">%</span>
    </div>
    <h3 id="result-title"></h3>
    <p id="result-msg"></p>
    <div class="modal-stats">
      <div class="modal-stat">
        <div class="stat-val" id="stat-time">—</div>
        <div class="stat-lbl">Tiempo</div>
      </div>
      <div class="modal-stat">
        <div class="stat-val" id="stat-attempts">—</div>
        <div class="stat-lbl">Intentos</div>
      </div>
      <div class="modal-stat">
        <div class="stat-val" id="stat-best">—</div>
        <div class="stat-lbl">Mejor</div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="window.location.href='/dashboard.html'">← Volver</button>
      <button class="btn btn-primary" onclick="retryChallenge()">Reintentar</button>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
const TYPE_LABELS = { quiz: '🧠 Test', fill_blank: '✏️ Cálculo', matching: '🔗 Relacionar', transform_game: '🎮 Juego Visual', slope_hunter: '🎯 Cazador', rocket_lander: '🚀 Aterrizaje' };
let challengeId, challengeData, startTime, timerInterval;

// Quiz state
let qIndex = 0, quizAnswers = [];
// Matching state
let selectedLeft = null, matchedCount = 0, matchResults = [];
// Fill state
let fillSubmitted = false;

(async () => {
  const me = await checkAuth(false);
  if (!me) return;
  document.getElementById('nav-username').textContent = me.username;
  setupLogout();

  const params = new URLSearchParams(location.search);
  challengeId = params.get('id');
  if (!challengeId) return (location.href = '/dashboard.html');

  try {
    challengeData = await API.get(`/api/challenges/${challengeId}`);
    renderChallenge();
    startTimer();
  } catch (e) {
    document.getElementById('challenge-body').innerHTML = `<p class="error-msg">${e.message}</p>`;
  }
})();

function startTimer() {
  startTime = Date.now();
  timerInterval = setInterval(() => {
    const s = Math.floor((Date.now() - startTime) / 1000);
    const m = Math.floor(s / 60), sec = s % 60;
    document.getElementById('timer').textContent =
      `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  }, 500);
}

function elapsedSeconds() {
  return Math.floor((Date.now() - startTime) / 1000);
}

function renderChallenge() {
  const { title, description, type, content } = challengeData;
  document.title = `MathQuest — ${title}`;
  document.getElementById('challenge-title').textContent = title;
  document.getElementById('challenge-desc').textContent = description || '';
  document.getElementById('type-badge').textContent = TYPE_LABELS[type] || type;

  const body = document.getElementById('challenge-body');
  if (type === 'quiz') {
    body.innerHTML = buildQuiz(content);
    showQuestion(0);
  } else if (type === 'fill_blank') {
    body.innerHTML = buildFillBlank(content);
  } else if (type === 'matching') {
    body.innerHTML = buildMatching(content);
  } else if (type === 'transform_game') {
    body.innerHTML = buildTransformGame(content);
    initTransformGame(content);
  } else if (type === 'slope_hunter') {
    body.innerHTML = buildSlopeHunter(content);
    initSlopeHunter(content);
  } else if (type === 'rocket_lander') {
    body.innerHTML = buildRocketLander(content);
    initRocketLander(content);
  } else {
    body.innerHTML = '<p class="error-msg">Tipo de desafío desconocido</p>';
  }
}

// ─────────────────────────── QUIZ ───────────────────────────────────────────

function buildQuiz(c) {
  quizAnswers = new Array(c.questions.length).fill(null);
  return `
    <div class="quiz-container">
      <div class="quiz-progress">
        <div class="progress-bar" style="flex:1">
          <div class="progress-fill" id="q-bar" style="width:${100/c.questions.length}%"></div>
        </div>
        <span id="q-counter">Pregunta 1 de ${c.questions.length}</span>
      </div>
      <div class="question-area" id="question-area"></div>
      <div class="quiz-footer">
        <button class="btn btn-primary hidden" id="next-btn" onclick="nextQuestion()">
          Siguiente →
        </button>
        <button class="btn btn-success hidden" id="finish-btn" onclick="finishQuiz()">
          Ver resultado
        </button>
      </div>
    </div>`;
}

function showQuestion(idx) {
  const c = challengeData.content;
  const q = c.questions[idx];
  const letters = ['A','B','C','D','E'];
  document.getElementById('q-counter').textContent = `Pregunta ${idx+1} de ${c.questions.length}`;
  document.getElementById('q-bar').style.width = `${((idx+1) / c.questions.length) * 100}%`;
  document.getElementById('next-btn').classList.add('hidden');
  document.getElementById('finish-btn').classList.add('hidden');

  document.getElementById('question-area').innerHTML = `
    <div class="question-text">${q.q}</div>
    <div class="options-list">
      ${q.opts.map((o, i) => `
        <button class="option-btn" onclick="selectOption(${idx}, ${i})">
          <span class="option-letter">${letters[i]}</span>
          ${o}
        </button>`).join('')}
    </div>
    <div id="explanation" class="hidden"></div>`;
}

function selectOption(qIdx, optIdx) {
  if (quizAnswers[qIdx] !== null) return;
  const q = challengeData.content.questions[qIdx];
  quizAnswers[qIdx] = optIdx;
  const correct = optIdx === q.ans;

  document.querySelectorAll('.option-btn').forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.ans) btn.classList.add('correct');
    else if (i === optIdx && !correct) btn.classList.add('wrong');
  });

  const expEl = document.getElementById('explanation');
  expEl.className = `explanation-box ${correct ? '' : 'wrong'}`;
  expEl.textContent = (correct ? '✓ ' : '✗ ') + (q.explain || (correct ? '¡Correcto!' : 'Incorrecto.'));
  expEl.classList.remove('hidden');

  const isLast = qIdx === challengeData.content.questions.length - 1;
  if (isLast) document.getElementById('finish-btn').classList.remove('hidden');
  else document.getElementById('next-btn').classList.remove('hidden');
}

function nextQuestion() {
  qIndex++;
  showQuestion(qIndex);
}

function finishQuiz() {
  const correct = quizAnswers.filter((a, i) => a === challengeData.content.questions[i].ans).length;
  const score = Math.round((correct / challengeData.content.questions.length) * 100);
  submitResult(score);
}

// ─────────────────────────── FILL BLANK ─────────────────────────────────────

function buildFillBlank(c) {
  return `
    <div class="fill-container">
      <div class="fill-intro">
        <p>${c.intro}</p>
        ${c.context ? `<pre class="fill-context">${c.context}</pre>` : ''}
      </div>
      <div class="fill-problems">
        ${c.problems.map((p, i) => `
          <div class="fill-problem" id="fp-${i}">
            <label>${i+1}. ${p.q}</label>
            ${p.hint ? `<div class="hint">Pista: ${p.hint}</div>` : ''}
            <div class="fill-answer-row">
              <input type="text" id="fa-${i}" placeholder="Tu respuesta..." autocomplete="off">
              <span id="fi-${i}"></span>
            </div>
            <div class="fill-feedback" id="ff-${i}"></div>
          </div>`).join('')}
      </div>
      <div class="fill-footer">
        <span id="fill-score-info" style="font-size:0.9rem;color:var(--text-muted)"></span>
        <div style="display:flex;gap:10px;">
          <button class="btn btn-secondary" id="check-btn" onclick="checkFill()">Comprobar</button>
          <button class="btn btn-success hidden" id="submit-fill-btn" onclick="submitFill()">Enviar resultado</button>
        </div>
      </div>
    </div>`;
}

function checkAnswer(user, correct) {
  const u = user.trim();
  const c = correct.toString().trim();
  const uN = parseFloat(u), cN = parseFloat(c);
  if (!isNaN(uN) && !isNaN(cN)) return Math.abs(uN - cN) < 0.01;
  return u.toLowerCase() === c.toLowerCase();
}

function checkFill() {
  const problems = challengeData.content.problems;
  let correct = 0;
  problems.forEach((p, i) => {
    const val = document.getElementById(`fa-${i}`)?.value || '';
    const ok = checkAnswer(val, p.ans);
    if (ok) correct++;
    const fp = document.getElementById(`fp-${i}`);
    const inp = document.getElementById(`fa-${i}`);
    const fb = document.getElementById(`ff-${i}`);
    fp.className = `fill-problem ${ok ? 'correct' : 'wrong'}`;
    inp.className = ok ? 'correct' : 'wrong';
    fb.className = `fill-feedback ${ok ? 'correct' : 'wrong'}`;
    fb.textContent = ok ? '✓ ¡Correcto!' : `✗ La respuesta correcta es: ${p.ans}`;
  });
  const score = Math.round((correct / problems.length) * 100);
  document.getElementById('fill-score-info').textContent = `${correct}/${problems.length} correctas`;
  document.getElementById('submit-fill-btn').classList.remove('hidden');
  document.getElementById('check-btn').classList.add('hidden');
  fillSubmitted = true;
  // auto-submit
  setTimeout(() => submitFill(score), 100);
}

function submitFill() {
  const problems = challengeData.content.problems;
  let correct = 0;
  problems.forEach((p, i) => {
    const val = document.getElementById(`fa-${i}`)?.value || '';
    if (checkAnswer(val, p.ans)) correct++;
  });
  const score = Math.round((correct / problems.length) * 100);
  submitResult(score);
}

// ─────────────────────────── MATCHING ───────────────────────────────────────

function buildMatching(c) {
  const shuffled = [...c.pairs].map((p, i) => ({ ...p, origIdx: i }));
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  matchResults = new Array(c.pairs.length).fill(null); // null = unmatched, true/false = result

  const leftHtml = c.pairs.map((p, i) =>
    `<div class="match-item" id="ml-${i}" onclick="clickLeft(${i})">${p.left}</div>`
  ).join('');
  const rightHtml = shuffled.map((p, i) =>
    `<div class="match-item" id="mr-${i}" data-orig="${p.origIdx}" onclick="clickRight(${i})">${p.right}</div>`
  ).join('');

  return `
    <div class="matching-container">
      <div class="matching-intro"><p>${c.intro}</p></div>
      <div class="matching-grid">
        <div class="matching-col">
          <h4>Función / Concepto</h4>
          ${leftHtml}
        </div>
        <div class="matching-col">
          <h4>Definición / Resultado</h4>
          ${rightHtml}
        </div>
      </div>
      <div class="matching-footer">
        <span class="matching-score-info" id="match-info">Selecciona un elemento de la izquierda</span>
        <button class="btn btn-success hidden" id="submit-match-btn" onclick="submitMatch()">Ver resultado</button>
      </div>
    </div>`;
}

function clickLeft(idx) {
  const el = document.getElementById(`ml-${idx}`);
  if (el.classList.contains('matched')) return;
  document.querySelectorAll('.matching-col .match-item').forEach(e => e.classList.remove('selected'));
  if (selectedLeft === idx) { selectedLeft = null; return; }
  el.classList.add('selected');
  selectedLeft = idx;
  document.getElementById('match-info').textContent = 'Ahora selecciona su pareja de la derecha';
}

function clickRight(idx) {
  const el = document.getElementById(`mr-${idx}`);
  if (el.classList.contains('matched') || selectedLeft === null) return;

  const origIdx = parseInt(el.dataset.orig);
  const correct = origIdx === selectedLeft;

  if (correct) {
    el.classList.add('matched');
    const leftEl = document.getElementById(`ml-${selectedLeft}`);
    leftEl.classList.remove('selected');
    leftEl.classList.add('matched');
    matchResults[selectedLeft] = true;
    matchedCount++;

    const total = challengeData.content.pairs.length;
    document.getElementById('match-info').textContent = `${matchedCount}/${total} emparejados`;

    if (matchedCount === total) {
      document.getElementById('submit-match-btn').classList.remove('hidden');
      document.getElementById('match-info').textContent = '¡Todos emparejados! Haz clic en Ver resultado.';
    }
    selectedLeft = null;
  } else {
    el.classList.add('wrong-flash');
    document.getElementById(`ml-${selectedLeft}`)?.classList.add('wrong-flash');
    setTimeout(() => {
      el.classList.remove('wrong-flash');
      document.getElementById(`ml-${selectedLeft}`)?.classList.remove('wrong-flash');
      document.getElementById(`ml-${selectedLeft}`)?.classList.remove('selected');
    }, 400);
    selectedLeft = null;
    document.getElementById('match-info').textContent = 'Incorrecto, intenta de nuevo';
  }
}

function submitMatch() {
  const total = challengeData.content.pairs.length;
  const score = Math.round((matchedCount / total) * 100);
  submitResult(score);
}

// ─────────────────────────── SUBMIT ─────────────────────────────────────────

async function submitResult(score) {
  clearInterval(timerInterval);
  const timeSpent = elapsedSeconds();

  try {
    const res = await API.post(`/api/challenges/${challengeId}/submit`, { score, timeSpent });
    showResultModal(score, timeSpent, res.progress);
  } catch (e) {
    showResultModal(score, timeSpent, null);
  }
}

function showResultModal(score, timeSpent, progress) {
  const pass = score >= 50;
  const messages = pass
    ? ['¡Excelente trabajo!', '¡Lo has conseguido!', '¡Muy bien hecho!', '¡Eres una máquina!']
    : ['¡Sigue intentándolo!', '¡Casi lo tienes!', 'Puedes mejorar con práctica'];
  const msg = pass
    ? '¡Has superado el desafío! Tu puntuación ha sido guardada.'
    : 'No has alcanzado el mínimo (50%). ¡Puedes volver a intentarlo!';

  document.getElementById('score-num').textContent = score;
  document.getElementById('score-circle').className = `score-circle ${pass ? 'pass' : 'fail'}`;
  document.getElementById('result-title').textContent = messages[Math.floor(Math.random() * messages.length)];
  document.getElementById('result-msg').textContent = msg;
  document.getElementById('stat-time').textContent = fmtTime(timeSpent);
  document.getElementById('stat-attempts').textContent = progress?.attempts ?? '—';
  document.getElementById('stat-best').textContent = progress ? `${Math.round(progress.best_score)}%` : `${score}%`;
  document.getElementById('result-modal').classList.remove('hidden');
}

function retryChallenge() {
  document.getElementById('result-modal').classList.add('hidden');
  qIndex = 0; quizAnswers = []; selectedLeft = null; matchedCount = 0; matchResults = []; fillSubmitted = false;
  tgState = { ...tgState, levelIndex: 0, animating: false };
  sgState = { ...sgState, levelIndex: 0, lives: 3 };
  if (rlState.raf) { cancelAnimationFrame(rlState.raf); rlState.raf = null; }
  rlState.running = false; rlState.thrusting = false; rlState.levelIndex = 0;
  renderChallenge();
  startTimer();
}

// ─────────────────── TRANSFORM GAME ─────────────────────────────────────────

// "F" shape — icónica en gráficos por ordenador para mostrar transformaciones
const TG_SHAPE = [
  [-0.8,-1.3],[0.8,-1.3],[0.8,-0.8],
  [-0.1,-0.8],[-0.1,-0.3],[0.5,-0.3],
  [0.5, 0.2],[-0.1, 0.2],[-0.1, 1.3],
  [-0.8, 1.3]
];

let tgState = {
  content: null, levelIndex: 0, animating: false,
  levelAttempts: [], levelSolved: [], starsPerLevel: [],
  currentPoints: [...TG_SHAPE], targetPoints: []
};

function buildTransformGame(c) {
  return `
  <div class="transform-game">
    <div class="tg-progress" id="tg-progress"></div>
    <div class="tg-level-header">
      <div>
        <div class="tg-level-num" id="tg-levelnum"></div>
        <div class="tg-level-name" id="tg-levelname"></div>
      </div>
      <div class="tg-stars" id="tg-stars">★★★</div>
    </div>
    <p class="tg-desc" id="tg-desc"></p>
    <div class="tg-layout">
      <div class="tg-canvas-wrap">
        <div class="tg-legend">
          <span class="tg-leg-item tg-leg-orig">Original</span>
          <span class="tg-leg-item tg-leg-target">Objetivo</span>
          <span class="tg-leg-item tg-leg-user">Tu resultado</span>
        </div>
        <canvas id="tg-canvas" width="340" height="340"></canvas>
      </div>
      <div class="tg-panel">
        <div class="tg-matrix-label">Tu matriz 2×2:</div>
        <div class="tg-matrix-wrap">
          <div class="tg-bracket">⎡<br><br>⎣</div>
          <div class="tg-cells">
            <div class="tg-row">
              <input class="tg-cell" id="tga" type="number" value="1" step="0.5">
              <input class="tg-cell" id="tgb" type="number" value="0" step="0.5">
            </div>
            <div class="tg-row">
              <input class="tg-cell" id="tgc" type="number" value="0" step="0.5">
              <input class="tg-cell" id="tgd" type="number" value="1" step="0.5">
            </div>
          </div>
          <div class="tg-bracket">⎤<br><br>⎦</div>
        </div>
        <div class="tg-cell-labels">
          <span>a</span><span>b</span><span>c</span><span>d</span>
        </div>
        <div style="font-size:0.78rem;color:var(--text-muted);margin-bottom:4px;">
          Efecto: x′=ax+by &nbsp;|&nbsp; y′=cx+dy
        </div>
        <div class="tg-attempt-info">Intentos: <strong id="tg-attempts">0</strong></div>
        <button class="btn btn-primary full-width" onclick="tgApply()">▶ Aplicar</button>
        <div style="display:flex;gap:6px;margin-top:6px;">
          <button class="btn btn-ghost btn-sm" style="flex:1" onclick="tgHint()">💡 Pista</button>
          <button class="btn btn-ghost btn-sm" style="flex:1" onclick="tgReset()">↺ Reset</button>
        </div>
        <div class="tg-hint-box hidden" id="tg-hintbox"></div>
        <div class="tg-feedback hidden" id="tg-feedback"></div>
      </div>
    </div>
    <div class="tg-next-wrap hidden" id="tg-next-wrap">
      <button class="btn btn-success btn-lg" onclick="tgNextLevel()">Siguiente nivel →</button>
    </div>
  </div>`;
}

function initTransformGame(content) {
  tgState.content = content;
  tgState.levelIndex = 0;
  tgState.levelAttempts = new Array(content.levels.length).fill(0);
  tgState.levelSolved   = new Array(content.levels.length).fill(false);
  tgState.starsPerLevel = new Array(content.levels.length).fill(0);

  // Render progress dots
  document.getElementById('tg-progress').innerHTML =
    content.levels.map((_,i) => `<div class="tg-dot" id="tgdot-${i}"></div>`).join('');

  // Enter key on matrix inputs
  ['tga','tgb','tgc','tgd'].forEach(id =>
    document.getElementById(id)?.addEventListener('keydown', e => { if (e.key==='Enter') tgApply(); })
  );
  tgLoadLevel();
}

function tgApplyMatrix([x,y], [a,b,c,d]) { return [a*x+b*y, c*x+d*y]; }

function tgLoadLevel() {
  const { content, levelIndex: i } = tgState;
  const level = content.levels[i];
  const n = content.levels.length;

  document.getElementById('tg-levelnum').textContent  = `Nivel ${i+1} de ${n}`;
  document.getElementById('tg-levelname').textContent = level.name;
  document.getElementById('tg-desc').textContent      = level.desc;
  document.getElementById('tg-attempts').textContent  = '0';
  document.getElementById('tg-stars').textContent     = '★★★';
  document.getElementById('tg-next-wrap').classList.add('hidden');
  document.getElementById('tg-feedback').classList.add('hidden');
  document.getElementById('tg-hintbox').classList.add('hidden');
  ['tga','tgb','tgc','tgd'].forEach((id,i) =>
    { const el=document.getElementById(id); if(el) el.value=[1,0,0,1][i]; }
  );

  // Update dots
  for (let j=0; j<n; j++) {
    const dot = document.getElementById(`tgdot-${j}`);
    if (!dot) continue;
    dot.className = 'tg-dot' + (j<i?' tg-dot-done':j===i?' tg-dot-active':'');
  }

  tgState.targetPoints  = TG_SHAPE.map(p => tgApplyMatrix(p, level.matrix));
  tgState.currentPoints = TG_SHAPE.map(p => [...p]);
  tgDraw(tgState.currentPoints);
}

function tgDraw(userPts) {
  const canvas = document.getElementById('tg-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const S = 340, sc = 48, ox = S/2, oy = S/2;
  const tc = ([x,y]) => [ox+x*sc, oy-y*sc];

  ctx.clearRect(0,0,S,S);

  // Grid
  ctx.strokeStyle='#e5e7eb'; ctx.lineWidth=1;
  for (let v=-3.5; v<=3.5; v++) {
    ctx.beginPath(); ctx.moveTo(...tc([v,-3.5])); ctx.lineTo(...tc([v,3.5])); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(...tc([-3.5,v])); ctx.lineTo(...tc([3.5,v])); ctx.stroke();
  }

  // Axes
  ctx.strokeStyle='#9ca3af'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(...tc([-3.5,0])); ctx.lineTo(...tc([3.5,0])); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(...tc([0,-3.5])); ctx.lineTo(...tc([0,3.5])); ctx.stroke();
  ctx.fillStyle='#9ca3af'; ctx.font='bold 12px sans-serif';
  ctx.fillText('x', tc([3.3,0])[0]-4, tc([3.3,0])[1]-6);
  ctx.fillText('y', tc([0,3.3])[0]+6, tc([0,3.3])[1]+4);

  // Helper: draw closed polygon
  const poly = (pts, fill, stroke, alpha=1) => {
    if (!pts.length) return;
    ctx.globalAlpha=alpha; ctx.beginPath();
    ctx.moveTo(...tc(pts[0]));
    pts.slice(1).forEach(p => ctx.lineTo(...tc(p)));
    ctx.closePath();
    ctx.fillStyle=fill; ctx.fill();
    ctx.strokeStyle=stroke; ctx.lineWidth=2.5; ctx.stroke();
    ctx.globalAlpha=1;
  };

  // Original shape (gray dashed)
  ctx.globalAlpha=0.3; ctx.setLineDash([5,4]);
  ctx.beginPath(); ctx.moveTo(...tc(TG_SHAPE[0]));
  TG_SHAPE.slice(1).forEach(p=>ctx.lineTo(...tc(p)));
  ctx.closePath(); ctx.strokeStyle='#6b7280'; ctx.lineWidth=2; ctx.stroke();
  ctx.globalAlpha=1; ctx.setLineDash([]);

  // Target (red)
  poly(tgState.targetPoints, 'rgba(239,68,68,0.12)', '#ef4444');

  // User result (purple)
  poly(userPts, 'rgba(124,58,237,0.22)', '#7c3aed');
}

function tgGetMatrix() {
  return ['tga','tgb','tgc','tgd'].map(id => parseFloat(document.getElementById(id)?.value)||0);
}

function tgApply() {
  if (tgState.animating) return;
  const m = tgGetMatrix();
  const toPoints = TG_SHAPE.map(p => tgApplyMatrix(p, m));
  tgState.levelAttempts[tgState.levelIndex]++;
  document.getElementById('tg-attempts').textContent = tgState.levelAttempts[tgState.levelIndex];

  const from = tgState.currentPoints.map(p=>[...p]);
  tgAnimate(from, toPoints, 550, () => {
    tgState.currentPoints = toPoints;
    tgCheckCorrect(m, tgState.content.levels[tgState.levelIndex].matrix);
  });
}

function tgAnimate(from, to, ms, done) {
  tgState.animating = true;
  const t0 = Date.now();
  (function frame() {
    const t = Math.min(1,(Date.now()-t0)/ms);
    const e = t<0.5 ? 2*t*t : -1+(4-2*t)*t;
    tgDraw(from.map((p,i)=>[p[0]+(to[i][0]-p[0])*e, p[1]+(to[i][1]-p[1])*e]));
    t<1 ? requestAnimationFrame(frame) : (tgState.animating=false, done&&done());
  })();
}

function tgCheckCorrect(userM, correctM) {
  const ok = userM.every((v,i) => Math.abs(v-correctM[i])<0.15);
  const fb = document.getElementById('tg-feedback');
  fb.classList.remove('hidden');

  if (ok) {
    const att = tgState.levelAttempts[tgState.levelIndex];
    const stars = att===1?3:att===2?2:1;
    tgState.starsPerLevel[tgState.levelIndex] = stars;
    tgState.levelSolved[tgState.levelIndex]   = true;
    document.getElementById('tg-stars').textContent = '★'.repeat(stars)+'☆'.repeat(3-stars);
    fb.className='tg-feedback tg-correct';
    fb.innerHTML=`✓ ¡Correcto! ${'★'.repeat(stars)+'☆'.repeat(3-stars)}<br>
      <small>La matriz correcta es [[${correctM[0]},${correctM[1]}],[${correctM[2]},${correctM[3]}]]</small>`;
    tgCelebrate();
    document.getElementById(`tgdot-${tgState.levelIndex}`)?.classList.replace('tg-dot-active','tg-dot-done');
    const isLast = tgState.levelIndex === tgState.content.levels.length-1;
    setTimeout(() => isLast ? tgFinish() : document.getElementById('tg-next-wrap').classList.remove('hidden'), 1200);
  } else {
    const diff = Math.max(...userM.map((v,i)=>Math.abs(v-correctM[i])));
    fb.className='tg-feedback tg-wrong';
    fb.textContent = diff<1 ? '✗ ¡Muy cerca! Ajusta un poco más.' : diff<2 ? '✗ Casi. Revisa los valores.' : '✗ No es correcto. Prueba la pista.';
  }
}

function tgCelebrate() {
  const canvas = document.getElementById('tg-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const colors = ['#7c3aed','#10b981','#f59e0b','#ef4444','#0ea5e9'];
  const parts = Array.from({length:24},()=>({
    x:170+(Math.random()-0.5)*120, y:170+(Math.random()-0.5)*120,
    vx:(Math.random()-0.5)*7, vy:(Math.random()-0.5)*7-2,
    c:colors[Math.floor(Math.random()*5)], r:Math.random()*5+3, life:1
  }));
  const t0=Date.now();
  (function boom(){
    if(Date.now()-t0>1100){tgDraw(tgState.currentPoints);return;}
    tgDraw(tgState.currentPoints);
    parts.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy; p.vy+=0.18; p.life-=0.025;
      ctx.globalAlpha=Math.max(0,p.life);
      ctx.fillStyle=p.c; ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=1;
    });
    requestAnimationFrame(boom);
  })();
}

function tgNextLevel() { tgState.levelIndex++; tgLoadLevel(); }
function tgHint()      {
  const h=document.getElementById('tg-hintbox');
  h.textContent='💡 '+tgState.content.levels[tgState.levelIndex].hint;
  h.classList.remove('hidden');
}
function tgReset() {
  ['tga','tgb','tgc','tgd'].forEach((id,i)=>{const el=document.getElementById(id);if(el)el.value=[1,0,0,1][i];});
  tgState.currentPoints=TG_SHAPE.map(p=>[...p]);
  tgDraw(tgState.currentPoints);
  document.getElementById('tg-feedback').classList.add('hidden');
}
function tgFinish() {
  const total=tgState.starsPerLevel.reduce((a,b)=>a+b,0);
  const max=tgState.content.levels.length*3;
  submitResult(Math.round((total/max)*100));
}

// ─────────────────── SLOPE HUNTER ────────────────────────────────────────────

const SG_FUNCS = {
  parabola_neg:   { f: x => -x*x+4,            df: x => -2*x },
  cubic_classic:  { f: x => x*x*x-3*x,         df: x => 3*x*x-3 },
  quartic_double: { f: x => x*x*x*x-4*x*x,     df: x => 4*x*x*x-8*x },
  cubic_optim:    { f: x => x*x*x-6*x*x+9*x,   df: x => 3*x*x-12*x+9 },
  sine:           { f: Math.sin,                df: Math.cos },
};

let sgState = {
  content: null, levelIndex: 0, lives: 3,
  found: [], wrongPerCrit: [], yRange: null,
  levelScores: [], particles: [], stars: [],
  mouseWX: null,
};

function buildSlopeHunter(c) {
  return `
  <div class="slope-game">
    <div class="sg-top">
      <div class="sg-prog" id="sg-prog"></div>
      <div class="sg-lives" id="sg-lives">❤️❤️❤️</div>
    </div>
    <div class="sg-level-header">
      <div class="sg-level-num" id="sg-levelnum"></div>
      <div class="sg-level-name" id="sg-levelname"></div>
    </div>
    <div class="sg-formula-box" id="sg-formula"></div>
    <div class="sg-found-bar" id="sg-found-bar"></div>
    <div class="sg-canvas-wrap">
      <canvas id="sg-canvas" width="560" height="360"></canvas>
      <div class="sg-slope-row">
        <span class="sg-slope-label">f'(x) = pendiente:</span>
        <span class="sg-slope-val" id="sg-slope-val">mueve el ratón →</span>
      </div>
    </div>
    <div class="sg-instruction">
      🖱️ Mueve el ratón sobre la gráfica · Cuando la pendiente esté cerca de <strong>0</strong> (recta horizontal) · ¡Haz clic!
    </div>
    <div style="padding:0 24px 16px;display:flex;gap:8px;align-items:flex-start;flex-direction:column;">
      <button class="btn btn-ghost btn-sm" onclick="sgHint()">💡 Pista</button>
      <div class="sg-hint-box hidden" id="sg-hint-box"></div>
    </div>
    <div class="sg-next-wrap hidden" id="sg-next-wrap">
      <button class="btn btn-success btn-lg" onclick="sgNextLevel()">Siguiente nivel →</button>
    </div>
  </div>`;
}

function initSlopeHunter(content) {
  sgState.content = content;
  sgState.levelIndex = 0;
  sgState.lives = 3;
  sgState.levelScores = new Array(content.levels.length).fill(0);
  document.getElementById('sg-prog').innerHTML =
    content.levels.map((_,i) => `<div class="tg-dot" id="sgdot-${i}"></div>`).join('');
  sgLoad();
}

function sgLevel()  { return sgState.content.levels[sgState.levelIndex]; }
function sgFn()     { return SG_FUNCS[sgLevel().fType]; }

function sgYRange(f, xr) {
  let mn=Infinity, mx=-Infinity;
  for (let x=xr[0]; x<=xr[1]; x+=0.02) {
    const y=f(x); if(isFinite(y)){mn=Math.min(mn,y);mx=Math.max(mx,y);}
  }
  const pad=Math.max((mx-mn)*0.28,0.5);
  return [mn-pad, mx+pad];
}

function sgLoad() {
  const lv=sgLevel(), i=sgState.levelIndex, n=sgState.content.levels.length;
  sgState.found         = new Array(lv.criticals.length).fill(false);
  sgState.wrongPerCrit  = new Array(lv.criticals.length).fill(0);
  sgState.particles     = [];
  sgState.stars         = [];
  sgState.mouseWX       = null;
  sgState.yRange        = sgYRange(sgFn().f, lv.xRange);

  document.getElementById('sg-levelnum').textContent  = `Nivel ${i+1} de ${n}`;
  document.getElementById('sg-levelname').textContent = lv.name;
  document.getElementById('sg-formula').textContent   = lv.desc;
  document.getElementById('sg-found-bar').textContent = `Encontrados: 0 / ${lv.criticals.length}`;
  document.getElementById('sg-slope-val').textContent = 'mueve el ratón →';
  document.getElementById('sg-slope-val').className   = 'sg-slope-val';
  document.getElementById('sg-next-wrap').classList.add('hidden');
  document.getElementById('sg-hint-box').classList.add('hidden');

  for (let j=0; j<n; j++) {
    const d=document.getElementById(`sgdot-${j}`);
    if(d) d.className='tg-dot'+(j<i?' tg-dot-done':j===i?' tg-dot-active':'');
  }
  sgUpdateLives();

  const cv=document.getElementById('sg-canvas');
  if (!cv) return;
  cv.onmousemove  = e => { sgState.mouseWX=sgEvtX(e);  sgDraw(); };
  cv.onclick      = e => { sgClick(sgEvtX(e)); };
  cv.onmouseleave = () => { sgState.mouseWX=null; sgDraw(); document.getElementById('sg-slope-val').textContent='mueve el ratón →'; document.getElementById('sg-slope-val').className='sg-slope-val'; };
  cv.ontouchmove  = e => { e.preventDefault(); sgState.mouseWX=sgEvtX(e.touches[0]); sgDraw(); };
  cv.ontouchend   = e => { e.preventDefault(); sgClick(sgEvtX(e.changedTouches[0])); };

  sgDraw();
}

function sgUpdateLives() {
  document.getElementById('sg-lives').textContent =
    '❤️'.repeat(sgState.lives) + '🖤'.repeat(Math.max(0,3-sgState.lives));
}

function sgScale() {
  const lv=sgLevel(), xr=lv.xRange, yr=sgState.yRange, W=560, H=360;
  const toC=(wx,wy)=>[(wx-xr[0])/(xr[1]-xr[0])*W, H-(wy-yr[0])/(yr[1]-yr[0])*H];
  const toW=(cx,cy)=>[cx/(W/(xr[1]-xr[0]))+xr[0], (H-cy)/(H/(yr[1]-yr[0]))+yr[0]];
  return {xr,yr,W,H,toC,toW};
}

function sgEvtX(e) {
  const cv=document.getElementById('sg-canvas'); if(!cv)return null;
  const r=cv.getBoundingClientRect(), scx=cv.width/r.width;
  const cx=(e.clientX-r.left)*scx;
  const {xr,W}=sgScale();
  return cx/W*(xr[1]-xr[0])+xr[0];
}

function sgDraw() {
  const cv=document.getElementById('sg-canvas'); if(!cv)return;
  const ctx=cv.getContext('2d');
  const {xr,yr,W,H,toC}=sgScale();
  const fn=sgFn();

  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#fafafa'; ctx.fillRect(0,0,W,H);

  // Grid
  ctx.strokeStyle='#e5e7eb'; ctx.lineWidth=1;
  const xStep=Math.max(1,Math.round((xr[1]-xr[0])/8));
  const yStep=Math.max(1,Math.round((yr[1]-yr[0])/6));
  for(let gx=Math.ceil(xr[0]);gx<=xr[1];gx+=xStep){
    const[cx]=toC(gx,0);ctx.beginPath();ctx.moveTo(cx,0);ctx.lineTo(cx,H);ctx.stroke();
    ctx.fillStyle='#d1d5db';ctx.font='11px sans-serif';
    const[,cy0]=toC(0,0);ctx.fillText(gx,cx+2,Math.min(H-4,Math.max(14,(isFinite(cy0)?cy0:H/2)+14)));
  }
  for(let gy=Math.ceil(yr[0]);gy<=yr[1];gy+=yStep){
    const[,cy]=toC(0,gy);ctx.beginPath();ctx.moveTo(0,cy);ctx.lineTo(W,cy);ctx.stroke();
    if(gy!==0){ctx.fillStyle='#d1d5db';ctx.font='11px sans-serif';
    const[cx0]=toC(0,0);ctx.fillText(gy,Math.max(2,Math.min(W-22,(isFinite(cx0)?cx0:0)+4)),cy-2);}
  }

  // Axes
  const[ax,ay]=toC(0,0);
  ctx.strokeStyle='#9ca3af';ctx.lineWidth=2;
  if(isFinite(ay)&&ay>=0&&ay<=H){ctx.beginPath();ctx.moveTo(0,ay);ctx.lineTo(W,ay);ctx.stroke();}
  if(isFinite(ax)&&ax>=0&&ax<=W){ctx.beginPath();ctx.moveTo(ax,0);ctx.lineTo(ax,H);ctx.stroke();}
  ctx.fillStyle='#6b7280';ctx.font='bold 12px sans-serif';
  ctx.fillText('x',W-12,isFinite(ay)?Math.min(H-4,Math.max(14,ay-4)):H-4);
  ctx.fillText('y',isFinite(ax)?Math.max(4,ax+4):4,14);

  // Curve
  ctx.beginPath();ctx.strokeStyle='#7c3aed';ctx.lineWidth=3;
  let started=false;
  for(let px=0;px<=W;px+=1.5){
    const wx=px/W*(xr[1]-xr[0])+xr[0];
    const wy=fn.f(wx);
    if(!isFinite(wy)||wy<yr[0]-2||wy>yr[1]+2){started=false;continue;}
    const[cx,cy]=toC(wx,wy);
    started?ctx.lineTo(cx,cy):ctx.moveTo(cx,cy);started=true;
  }
  ctx.stroke();

  // Found stars
  sgState.stars.forEach(s=>{
    const[cx,cy]=toC(s.x,fn.f(s.x));
    ctx.font='24px serif';ctx.fillText('⭐',cx-12,cy+9);
  });

  // Tangent line + cursor dot
  const wx=sgState.mouseWX;
  if(wx!==null&&isFinite(wx)&&wx>=xr[0]&&wx<=xr[1]){
    const wy=fn.f(wx), slope=fn.df(wx);
    if(isFinite(slope)&&isFinite(wy)){
      const ext=1.8;
      const[c1x,c1y]=toC(wx-ext, wy+slope*(-ext));
      const[c2x,c2y]=toC(wx+ext, wy+slope*(ext));
      const abs=Math.abs(slope);
      const col=abs<0.12?'#10b981':abs<0.45?'#84cc16':abs<1.2?'#f59e0b':'#ef4444';
      ctx.strokeStyle=col;ctx.lineWidth=2.5;ctx.setLineDash([7,4]);
      ctx.beginPath();ctx.moveTo(c1x,c1y);ctx.lineTo(c2x,c2y);ctx.stroke();
      ctx.setLineDash([]);
      const[cmx,cmy]=toC(wx,wy);
      ctx.fillStyle=col;ctx.beginPath();ctx.arc(cmx,cmy,7,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='white';ctx.lineWidth=2;ctx.stroke();

      // Update slope display
      const sv=document.getElementById('sg-slope-val');
      sv.textContent=slope.toFixed(3)+(abs<0.12?' ← ¡AHORA!':abs<0.45?' ← cerca':'');
      sv.className='sg-slope-val '+(abs<0.12?'sg-zero':abs<0.45?'sg-warm':'sg-hot');
    }
  }

  // Particles
  sgState.particles.forEach(p=>{
    ctx.globalAlpha=Math.max(0,p.life);
    ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
  });ctx.globalAlpha=1;
}

function sgClick(wx) {
  if(!isFinite(wx))return;
  const lv=sgLevel(), fn=sgFn();
  const tol=(lv.xRange[1]-lv.xRange[0])*0.08;

  let hit=-1;
  lv.criticals.forEach((cx,i)=>{ if(!sgState.found[i]&&Math.abs(wx-cx)<tol) hit=i; });

  if(hit>=0){
    sgState.found[hit]=true;
    const cx=lv.criticals[hit];
    sgState.stars.push({x:cx});
    sgBurst(cx,fn.f(cx));
    const done=sgState.found.filter(Boolean).length;
    document.getElementById('sg-found-bar').textContent=`Encontrados: ${done} / ${lv.criticals.length}`;
    if(done===lv.criticals.length) setTimeout(sgLevelDone,900);
  } else {
    sgState.lives--;sgUpdateLives();
    // Red flash
    const cv=document.getElementById('sg-canvas');
    if(cv){
      const ctx=cv.getContext('2d'),{toC,H}=sgScale();
      const[cx]=toC(wx,0);
      ctx.globalAlpha=0.28;ctx.fillStyle='#ef4444';
      ctx.fillRect(Math.max(0,cx-25),0,50,H);ctx.globalAlpha=1;
      setTimeout(()=>sgDraw(),300);
    }
    if(sgState.lives<=0) setTimeout(sgEndEarly,400);
  }
}

function sgBurst(wx,wy){
  const{toC}=sgScale();
  const[cx,cy]=toC(wx,wy);
  const cols=['#7c3aed','#10b981','#f59e0b','#f472b6','#0ea5e9','#22c55e'];
  for(let i=0;i<22;i++) sgState.particles.push({
    x:cx,y:cy,vx:(Math.random()-.5)*9,vy:(Math.random()-.5)*9-3,
    r:Math.random()*5+3,color:cols[Math.floor(Math.random()*cols.length)],life:1
  });
  const t0=Date.now();
  (function boom(){
    if(Date.now()-t0>950){sgState.particles=[];sgDraw();return;}
    sgState.particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.22;p.life-=0.028;});
    sgDraw();requestAnimationFrame(boom);
  })();
}

function sgLevelDone(){
  const lv=sgLevel();
  const found=sgState.found.filter(Boolean).length;
  sgState.levelScores[sgState.levelIndex]=Math.round((found/lv.criticals.length)*75+(sgState.lives/3)*25);
  document.getElementById(`sgdot-${sgState.levelIndex}`)?.classList.replace('tg-dot-active','tg-dot-done');
  const isLast=sgState.levelIndex===sgState.content.levels.length-1;
  isLast?setTimeout(sgFinish,600):document.getElementById('sg-next-wrap').classList.remove('hidden');
}

function sgEndEarly(){
  const lv=sgLevel();
  const found=sgState.found.filter(Boolean).length;
  sgState.levelScores[sgState.levelIndex]=Math.round((found/lv.criticals.length)*75);
  sgFinish();
}

function sgNextLevel(){
  sgState.levelIndex++;
  sgState.lives=Math.min(3,sgState.lives+1);
  sgLoad();
}

function sgHint(){
  const h=document.getElementById('sg-hint-box');
  h.textContent='💡 '+sgLevel().hint;
  h.classList.remove('hidden');
}

function sgFinish(){
  const avg=sgState.levelScores.reduce((a,b)=>a+b,0)/sgState.content.levels.length;
  submitResult(Math.round(avg));
}

        <div class="rl-slider-top">
          <span class="rl-slider-label">Empuje  <strong id="rl-aemp">0.00</strong> m/s²</span>
          <span class="rl-slider-hint">↑ ↓ flechas o arrastra</span>
        </div>
        <div class="rl-slider-row">
          <span class="rl-scap">0</span>
          <input type="range" id="rl-slider" class="rl-slider" min="0" max="100" step="1" value="0"
            oninput="rlSlider(this.value)">
          <span class="rl-scap" id="rl-scap-max">3g</span>
        </div>
        <div class="rl-decomp" id="rl-decomp">a<sub>emp</sub> − g = a<sub>neta</sub></div>
      </div>
      <div class="rl-guide-col">
        <div class="rl-guide-ok">✓ &lt; objetivo → Perfecto</div>
        <div class="rl-guide-warn">⚠ hasta 3× → Duro</div>
        <div class="rl-guide-err">✗ más → Impacto</div>
      </div>
    </div>
    <div class="rl-outcome-wrap hidden" id="rl-outcome">
      <div class="rl-outcome-box">
        <div class="rl-out-stars" id="rl-out-stars"></div>
        <div class="rl-out-title" id="rl-out-title"></div>
        <div class="rl-out-detail" id="rl-out-detail"></div>
        <button class="btn btn-primary" id="rl-out-btn" onclick="rlNextLevel()">Siguiente nivel →</button>
      </div>
    </div>
  </div>`;
}

function initRocketLander(content) {
  rlState.content     = content;
  rlState.levelIndex  = 0;
  rlState.levelScores = new Array(RL_LEVELS.length).fill(0);
  document.getElementById('rl-prog').innerHTML =
    RL_LEVELS.map((_,i)=>`<div class="tg-dot" id="rldot-${i}"></div>`).join('');
  document.removeEventListener('keydown', rlKeyDown);
  document.addEventListener('keydown', rlKeyDown);
  rlLoadLevel();
}

function rlKeyDown(e) {
  if(!rlState.running) return;
  if(e.code==='ArrowUp')  { e.preventDefault(); rlSlider(Math.min(100, rlState.thrustPct+3)); }
  if(e.code==='ArrowDown'){ e.preventDefault(); rlSlider(Math.max(0,   rlState.thrustPct-3)); }
}
function rlLv() { return RL_LEVELS[rlState.levelIndex]; }

function rlSlider(val) {
  val = parseInt(val);
  rlState.thrustPct = val;
  const el = document.getElementById('rl-slider');
  if(el) el.value = val;
  rlUpdateDecomp();
}

function rlUpdateDecomp() {
  const lv  = rlLv();
  const aemp = (rlState.thrustPct / 100) * lv.grav * 3;
  const net  = aemp - lv.grav;
  const netStr = (net>=0?'+':'')+net.toFixed(2);
  document.getElementById('rl-aemp').textContent = aemp.toFixed(2);
  const el = document.getElementById('rl-decomp');
  if(el) el.innerHTML =
    `${aemp.toFixed(2)} &minus; ${lv.grav.toFixed(2)} = <strong style="color:${net>0.05?'#4ade80':net<-0.05?'#f87171':'#e2e8f0'}">${netStr} m/s²</strong>`;
}

function rlLoadLevel() {
  const lv=rlLv(), i=rlState.levelIndex, n=RL_LEVELS.length;
  // Start slider at hover point: a_emp = g → pct = 1/3 → value ≈ 33
  const hoverPct = Math.round(100/3);
  Object.assign(rlState, {
    h:lv.initH, v:lv.initV, thrustPct:hoverPct,
    running:true, landed:false,
    history:[], time:0, lastTs:null
  });
  rlState.stars = Array.from({length:60},()=>({
    x:Math.random()*RL_ANIM_W, y:Math.random()*(RL_CVH*0.75),
    r:Math.random()*1.3+0.3, a:Math.random()*0.7+0.3
  }));

  document.getElementById('rl-lnum').textContent   = `Nivel ${i+1} de ${n}`;
  document.getElementById('rl-planet').textContent  = lv.planet;
  document.getElementById('rl-mission').textContent = lv.desc;
  document.getElementById('rl-slider').value        = hoverPct;
  document.getElementById('rl-scap-max').textContent= `${(lv.grav*3).toFixed(1)} m/s²`;
  document.getElementById('rl-outcome').classList.add('hidden');
  for(let j=0;j<n;j++){
    const d=document.getElementById(`rldot-${j}`);
    if(d) d.className='tg-dot'+(j<i?' tg-dot-done':j===i?' tg-dot-active':'');
  }
  rlUpdateDecomp();
  if(rlState.raf) cancelAnimationFrame(rlState.raf);
  rlState.raf = requestAnimationFrame(rlLoop);
}

function rlHtoY(h) {
  const SURF=RL_CVH-55, topY=38;
  return SURF - Math.min(1,Math.max(0, h/Math.max(rlLv().initH,20))) * (SURF-topY);
}

function rlLoop(ts) {
  if(!rlState.running) return;
  const dt_r = rlState.lastTs ? Math.min((ts-rlState.lastTs)/1000, 0.05) : 0.016;
  rlState.lastTs = ts;
  const dt = dt_r * 3.0;  // 3× time scale
  const lv = rlLv();

  const aemp  = (rlState.thrustPct/100)*lv.grav*3;
  const net_a = aemp - lv.grav;

  rlState.v    += net_a * dt;
  rlState.h    += rlState.v  * dt;
  rlState.time += dt;

  rlState.history.push({ t:rlState.time, a:net_a, v:rlState.v, h:rlState.h });
  if(rlState.history.length > 350) rlState.history.shift();

  // Update numeric displays
  const abvV = Math.abs(rlState.v);
  const vCol = abvV<lv.targetV?'#4ade80': abvV<lv.targetV*3?'#fbbf24':'#f87171';
  const aCol = net_a>0.05?'#4ade80': net_a<-0.05?'#f87171':'#e2e8f0';
  document.getElementById('rl-dsp-a').textContent = (net_a>=0?'+':'')+net_a.toFixed(2);
  document.getElementById('rl-dsp-a').style.color = aCol;
  document.getElementById('rl-dsp-v').textContent = rlState.v.toFixed(1);
  document.getElementById('rl-dsp-v').style.color = vCol;
  document.getElementById('rl-dsp-h').textContent = Math.max(0,rlState.h).toFixed(0);

  rlDraw();

  if(rlState.h <= 0){
    rlState.h=0; rlState.running=false;
    rlDraw();
    setTimeout(()=>rlShowResult(Math.abs(rlState.v)), 300);
    return;
  }
  rlState.raf = requestAnimationFrame(rlLoop);
}

function rlDraw() {
  const cv=document.getElementById('rl-canvas'); if(!cv) return;
  const ctx=cv.getContext('2d');
  const W=RL_CVW, H=RL_CVH, lv=rlLv();

  ctx.clearRect(0,0,W,H);
  rlDrawScene(ctx);
  rlDrawGraphs(ctx);
  // Column separator
  ctx.strokeStyle='rgba(255,255,255,0.08)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(RL_ANIM_W+2,0); ctx.lineTo(RL_ANIM_W+2,H); ctx.stroke();
}

// ── Left animation panel ──────────────────────────────────────────────────────
function rlDrawScene(ctx) {
  const lv=rlLv(), AW=RL_ANIM_W, H=RL_CVH;
  const SURF_Y=H-52, PAD_CX=AW/2, PAD_W=72;

  // Sky
  const skyG=ctx.createLinearGradient(0,0,0,SURF_Y);
  skyG.addColorStop(0,lv.skyT); skyG.addColorStop(1,lv.skyB);
  ctx.fillStyle=skyG; ctx.fillRect(0,0,AW,H);

  // Stars
  rlState.stars.forEach(s=>{
    ctx.globalAlpha=s.a*(0.55+0.45*Math.sin(rlState.time+s.x*.05));
    ctx.fillStyle='#fff'; ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
  }); ctx.globalAlpha=1;

  // Surface
  const surfG=ctx.createLinearGradient(0,SURF_Y,0,H);
  surfG.addColorStop(0,`rgb(${lv.sR},${lv.sG},${lv.sB})`);
  surfG.addColorStop(1,`rgb(${Math.floor(lv.sR*.35)},${Math.floor(lv.sG*.35)},${Math.floor(lv.sB*.35)})`);
  ctx.fillStyle=surfG; ctx.fillRect(0,SURF_Y,AW,H-SURF_Y);

  // Landing pad
  ctx.fillStyle='rgba(255,255,150,0.1)'; ctx.fillRect(PAD_CX-PAD_W/2,SURF_Y-16,PAD_W,16);
  ctx.fillStyle='#d0d4dc'; ctx.fillRect(PAD_CX-PAD_W/2,SURF_Y-3,PAD_W,3);
  [-1,0,1].forEach(dx=>{
    const bx=PAD_CX+dx*(PAD_W/2-8);
    ctx.fillStyle=Math.sin(rlState.time*5+dx*1.8)>0?'#ffff44':'#554400';
    ctx.beginPath(); ctx.arc(bx,SURF_Y-7,3,0,Math.PI*2); ctx.fill();
  });

  // Altitude bar (right of scene)
  const altFrac=Math.min(1,Math.max(0,rlState.h/rlLv().initH));
  const abX=AW-10, abTop=30, abH=SURF_Y-40;
  ctx.fillStyle='rgba(255,255,255,0.06)'; ctx.fillRect(abX,abTop,6,abH);
  ctx.fillStyle='#4ade80'; ctx.fillRect(abX,abTop+abH*(1-altFrac),6,abH*altFrac);

  // Rocket
  const ry=rlHtoY(rlState.h);
  const aemp=(rlState.thrustPct/100)*rlLv().grav*3;
  const thrustOn = aemp > rlLv().grav*0.08;

  // Flame
  if(thrustOn){
    const fl=Math.max(6, (aemp/rlLv().grav)*14+Math.random()*8);
    const fg=ctx.createRadialGradient(PAD_CX,ry+46,2,PAD_CX,ry+58+fl,16);
    fg.addColorStop(0,'rgba(255,255,200,0.95)');
    fg.addColorStop(0.3,'rgba(255,150,30,0.8)');
    fg.addColorStop(1,'rgba(200,50,0,0)');
    ctx.fillStyle=fg;
    ctx.beginPath();
    ctx.moveTo(PAD_CX-9,ry+40);
    ctx.quadraticCurveTo(PAD_CX-14,ry+55+fl/2,PAD_CX,ry+58+fl);
    ctx.quadraticCurveTo(PAD_CX+14,ry+55+fl/2,PAD_CX+9,ry+40);
    ctx.closePath(); ctx.fill();
  }

  // Rocket body
  ctx.save(); ctx.translate(PAD_CX, ry);
  ctx.fillStyle='#475569';
  ctx.beginPath(); ctx.moveTo(-10,20); ctx.lineTo(-20,40); ctx.lineTo(-10,34); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo( 10,20); ctx.lineTo( 20,40); ctx.lineTo( 10,34); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#64748b'; ctx.fillRect(-7,34,14,9);
  const bg=ctx.createLinearGradient(-12,0,12,0);
  bg.addColorStop(0,'#94a3b8'); bg.addColorStop(0.35,'#f1f5f9'); bg.addColorStop(1,'#64748b');
  ctx.fillStyle=bg; ctx.beginPath(); ctx.roundRect(-10,-22,20,44,3); ctx.fill();
  ctx.fillStyle='#ef4444';
  ctx.beginPath(); ctx.moveTo(0,-40); ctx.lineTo(-10,-22); ctx.lineTo(10,-22); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#dc2626'; ctx.fillRect(-10,-4,20,5);
  ctx.fillStyle='#93c5fd'; ctx.beginPath(); ctx.arc(0,-12,6,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.beginPath(); ctx.arc(-2,-15,2.5,0,Math.PI*2); ctx.fill();
  if(thrustOn){
    ctx.strokeStyle='rgba(255,150,30,0.65)'; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.arc(0,34,11,0,Math.PI*2); ctx.stroke();
  }
  ctx.restore();

  // Velocity arrow indicator beside rocket
  const abvV=Math.abs(rlState.v);
  if(abvV>0.3){
    const arrX=PAD_CX+26, arrLen=Math.min(45,abvV*1.8);
    const dir=rlState.v>=0?-1:1;
    const aCol=abvV<rlLv().targetV?'#4ade80':abvV<rlLv().targetV*3?'#fbbf24':'#f87171';
    ctx.strokeStyle=aCol; ctx.fillStyle=aCol; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(arrX,ry); ctx.lineTo(arrX,ry+arrLen*dir); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(arrX,ry+arrLen*dir);
    ctx.lineTo(arrX-5,ry+arrLen*dir-5*dir);
    ctx.lineTo(arrX+5,ry+arrLen*dir-5*dir);
    ctx.closePath(); ctx.fill();
  }
}

// ── Right graphs panel ────────────────────────────────────────────────────────
function rlDrawGraphs(ctx) {
  const hist=rlState.history;
  const ROWS=[
    { key:'a', label:'a(t)', unit:'m/s²', col:'#fb923c', fill:'rgba(251,146,60,0.15)',  note:'pendiente de v(t)' },
    { key:'v', label:'v(t)', unit:'m/s',  col:'#60a5fa', fill:'rgba(96,165,250,0.15)',  note:'pendiente de h(t)' },
    { key:'h', label:'h(t)', unit:'m',    col:'#4ade80', fill:'rgba(74,222,128,0.12)',  note:'altitud' }
  ];
  const ROW_H=Math.floor(RL_CVH/3);
  const LP=46, RP=6, TP=20, BP=18; // left/right/top/bot padding inside each row

  ROWS.forEach((row, ri)=>{
    const ry0=ri*ROW_H, ry1=ry0+ROW_H-4;
    const PX=RL_GX+LP, PY=ry0+TP, PW=RL_GW-LP-RP, PH=ROW_H-TP-BP-4;

    // Background
    ctx.fillStyle='rgba(6,8,18,0.94)';
    ctx.fillRect(RL_GX, ry0, RL_GW, ROW_H-4);

    if(hist.length<2){ return; }

    const vals=hist.map(r=>r[row.key]);
    let vMin=Math.min(...vals), vMax=Math.max(...vals);
    const rng=vMax-vMin;
    if(rng<0.2){ vMin-=1; vMax+=1; } else { vMin-=rng*0.1; vMax+=rng*0.1; }
    const vR=vMax-vMin;
    const toX=i=>PX+(i/(hist.length-1))*PW;
    const toY=v=>PY+PH-Math.max(0,Math.min(PH,((v-vMin)/vR)*PH));

    // Grid lines + y-axis labels
    const nG=4;
    ctx.strokeStyle='rgba(255,255,255,0.05)'; ctx.lineWidth=1;
    ctx.fillStyle='rgba(148,163,184,0.65)'; ctx.font='9px monospace';
    ctx.textAlign='right';
    for(let li=0;li<=nG;li++){
      const gy=PY+(li/nG)*PH;
      ctx.beginPath(); ctx.moveTo(PX,gy); ctx.lineTo(PX+PW,gy); ctx.stroke();
      const val=vMax-(li/nG)*vR;
      const s=Math.abs(val)<100?val.toFixed(1):Math.round(val).toString();
      ctx.fillText(s, PX-3, gy+3);
    }
    ctx.textAlign='left';

    // Zero line
    if(vMin<0 && vMax>0){
      const zy=toY(0);
      ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.lineWidth=1.5;
      ctx.setLineDash([4,3]);
      ctx.beginPath(); ctx.moveTo(PX,zy); ctx.lineTo(PX+PW,zy); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle='rgba(255,255,255,0.4)'; ctx.font='9px monospace';
      ctx.fillText('0', PX-22, zy+3);
    }

    // Filled area to zero
    const zeroClamp=Math.max(PY,Math.min(PY+PH,toY(0)));
    ctx.beginPath();
    vals.forEach((v,i)=>{ const px=toX(i),py=toY(v); i===0?ctx.moveTo(px,py):ctx.lineTo(px,py); });
    ctx.lineTo(toX(vals.length-1),zeroClamp);
    ctx.lineTo(PX,zeroClamp);
    ctx.closePath();
    ctx.fillStyle=row.fill; ctx.fill();

    // Main curve
    ctx.beginPath(); ctx.strokeStyle=row.col; ctx.lineWidth=2.2;
    vals.forEach((v,i)=>{ const px=toX(i),py=toY(v); i===0?ctx.moveTo(px,py):ctx.lineTo(px,py); });
    ctx.stroke();

    // Current point dot
    const curV=vals[vals.length-1], curX=PX+PW, curY=toY(curV);
    ctx.fillStyle=row.col; ctx.beginPath(); ctx.arc(curX,curY,4.5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#0f172a'; ctx.beginPath(); ctx.arc(curX,curY,2,0,Math.PI*2); ctx.fill();

    // ── Derivative tangent indicator ──
    // Slope of this graph = value of graph above
    if(hist.length>12){
      const N=Math.min(12, Math.floor(hist.length*0.12));
      const dv=vals[vals.length-1]-vals[vals.length-1-N];
      const dx_px=N/(hist.length-1)*PW;
      const dy_px=-(dv/vR)*PH;  // negative because y is flipped
      const slopeLen=30;
      const mag=Math.sqrt(dx_px*dx_px+dy_px*dy_px)||1;
      const sdx=(dx_px/mag)*slopeLen, sdy=(dy_px/mag)*slopeLen;
      ctx.strokeStyle=`${row.col}bb`; ctx.lineWidth=2;
      ctx.beginPath();
      ctx.moveTo(curX-sdx,curY-sdy);
      ctx.lineTo(curX,curY);
      ctx.stroke();
    }

    // Row label (left)
    ctx.fillStyle=row.col; ctx.font='bold 11px monospace';
    ctx.fillText(row.label, RL_GX+4, ry0+TP+8);
    ctx.fillStyle='rgba(148,163,184,0.6)'; ctx.font='9px monospace';
    ctx.fillText(row.note, RL_GX+4, ry1-2);

    // Current value (top-right)
    const curStr=(Math.abs(curV)<1000)?curV.toFixed(1):Math.round(curV).toString();
    ctx.fillStyle=row.col; ctx.font='bold 11px monospace';
    ctx.textAlign='right';
    ctx.fillText(curStr+' '+row.unit, RL_GX+RL_GW-4, ry0+TP+8);
    ctx.textAlign='left';

    // ── Connecting arrow between rows (derivative label) ──
    if(ri<2){
      const arrowX=RL_GX+RL_GW-12;
      const arrowY=ry1-1;
      const nextCol=ROWS[ri+1].col;
      const derivLabel=ri===0?'= pendiente de v(t)':'= pendiente de h(t)';
      ctx.fillStyle='rgba(100,116,139,0.7)'; ctx.font='9px monospace';
      ctx.textAlign='right';
      ctx.fillText('↓ '+derivLabel, arrowX, arrowY);
      ctx.textAlign='left';
    }
  });

  // Time axis label
  ctx.fillStyle='rgba(100,116,139,0.55)'; ctx.font='10px monospace';
  ctx.fillText(`t = ${rlState.time.toFixed(1)} s`, RL_GX+4, RL_CVH-2);
}

function rlShowResult(spd) {
  const lv=rlLv();
  let score, stars, title, detail;
  if(spd < lv.targetV*0.6){
    score=100; stars='⭐⭐⭐'; title='🎯 ¡Aterrizaje perfecto!';
    detail=`v = ${spd.toFixed(1)} m/s al contacto\nDominas a(t) → v(t) → h(t).`;
  } else if(spd < lv.targetV){
    score=80; stars='⭐⭐'; title='✅ ¡Aterrizaje exitoso!';
    detail=`v = ${spd.toFixed(1)} m/s al contacto\nBuen control de la integración.`;
  } else if(spd < lv.targetV*3){
    score=40; stars='⭐'; title='⚠️ Aterrizaje duro';
    detail=`v = ${spd.toFixed(1)} m/s al contacto\nSube el empuje antes: la pendiente de v(t) = a(t).`;
  } else {
    score=0; stars='💥'; title='¡Impacto!';
    detail=`v = ${spd.toFixed(1)} m/s al contacto\nWhen a_neta > 0, v sube (frenado). Actúa cuando h aún da margen.`;
  }
  rlState.levelScores[rlState.levelIndex]=score;
  document.getElementById(`rldot-${rlState.levelIndex}`)?.classList.replace('tg-dot-active','tg-dot-done');
  document.getElementById('rl-out-stars').textContent=stars;
  document.getElementById('rl-out-title').textContent=title;
  document.getElementById('rl-out-detail').textContent=detail;
  const isLast=rlState.levelIndex===RL_LEVELS.length-1;
  document.getElementById('rl-out-btn').textContent=isLast?'🏁 Ver resultado final':'Siguiente nivel →';
  document.getElementById('rl-outcome').classList.remove('hidden');
}

function rlNextLevel() {
  rlState.levelIndex++;
  if(rlState.levelIndex>=RL_LEVELS.length){ rlFinish(); return; }
  rlLoadLevel();
}
function rlFinish() {
  const avg=rlState.levelScores.reduce((a,b)=>a+b,0)/RL_LEVELS.length;
  submitResult(Math.round(avg));
}

</script>
