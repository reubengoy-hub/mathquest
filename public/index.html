<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MathQuest — Gamificación Matemática</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-big">∑</div>
      <h1>MathQuest</h1>
      <p>Aprende matemáticas jugando</p>
    </div>

    <div class="auth-tabs">
      <button class="tab-btn active" onclick="switchTab('login')">Iniciar sesión</button>
      <button class="tab-btn" onclick="switchTab('register')">Registrarse</button>
    </div>

    <!-- LOGIN -->
    <div id="login-form">
      <div class="form-group">
        <label>Usuario</label>
        <input type="text" id="login-user" placeholder="Tu nombre de usuario" autocomplete="username">
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="login-pass" placeholder="Tu contraseña" autocomplete="current-password">
      </div>
      <div id="login-error" class="error-msg hidden"></div>
      <button class="btn btn-primary full-width btn-lg" onclick="doLogin()">Entrar</button>
    </div>

    <!-- REGISTER -->
    <div id="register-form" class="hidden">
      <div class="form-group">
        <label>Usuario (mín. 3 caracteres)</label>
        <input type="text" id="reg-user" placeholder="Elige un nombre de usuario" autocomplete="username">
      </div>
      <div class="form-group">
        <label>Contraseña (mín. 4 caracteres)</label>
        <input type="password" id="reg-pass" placeholder="Elige una contraseña" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label>Confirmar contraseña</label>
        <input type="password" id="reg-confirm" placeholder="Repite la contraseña" autocomplete="new-password">
      </div>
      <div id="reg-error" class="error-msg hidden"></div>
      <button class="btn btn-primary full-width btn-lg" onclick="doRegister()">Crear cuenta</button>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
// Redirect if already logged in
API.get('/api/auth/me').then(me => {
  window.location.href = me.isAdmin ? '/admin.html' : '/dashboard.html';
}).catch(() => {});

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', (i === 0) === (tab === 'login')));
  document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
  document.getElementById('register-form').classList.toggle('hidden', tab !== 'register');
}

function showError(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.classList.remove('hidden');
}

async function doLogin() {
  document.getElementById('login-error').classList.add('hidden');
  const username = document.getElementById('login-user').value.trim();
  const password = document.getElementById('login-pass').value;
  if (!username || !password) return showError('login-error', 'Completa todos los campos');
  try {
    const res = await API.post('/api/auth/login', { username, password });
    window.location.href = res.isAdmin ? '/admin.html' : '/dashboard.html';
  } catch (e) {
    showError('login-error', e.message);
  }
}

async function doRegister() {
  document.getElementById('reg-error').classList.add('hidden');
  const username = document.getElementById('reg-user').value.trim();
  const password = document.getElementById('reg-pass').value;
  const confirm  = document.getElementById('reg-confirm').value;
  if (!username || !password) return showError('reg-error', 'Completa todos los campos');
  if (password !== confirm) return showError('reg-error', 'Las contraseñas no coinciden');
  try {
    await API.post('/api/auth/register', { username, password });
    window.location.href = '/dashboard.html';
  } catch (e) {
    showError('reg-error', e.message);
  }
}

// Enter key support
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  if (!document.getElementById('login-form').classList.contains('hidden')) doLogin();
  else doRegister();
});
</script>
</body>
</html>
